<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immagine Random — Lorem Picsum</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 24px;
    }
    h1 { margin: 0; font-size: 1.5rem; font-weight: 600; }
    .cornice {
      position: relative;
      width: min(600px, 90vw);
      aspect-ratio: var(--ratio, 3 / 2);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .5);
      background: #1e293b;
      transition: aspect-ratio .2s ease;
    }
    #foto { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cornice.caricamento::after {
      content: "Caricamento…";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      background: #1e293b;
    }
    .controlli {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 24px;
      align-items: center;
      justify-content: center;
      background: #1e293b;
      padding: 14px 20px;
      border-radius: 14px;
    }
    .controlli label { display: inline-flex; align-items: center; gap: 8px; font-size: .95rem; }
    select {
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: .95rem;
    }
    .azioni { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    button {
      border: 0;
      padding: 12px 26px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      color: #0f172a;
      background: #38bdf8;
      transition: transform .1s ease, background .2s ease;
    }
    button.secondario { background: #475569; color: #e2e8f0; }
    button:hover { filter: brightness(1.1); }
    button:active { transform: scale(.96); }
    button:disabled { opacity: .6; cursor: progress; }
  </style>
</head>
<body>
  <h1>Immagine casuale</h1>

  <div class="cornice" id="cornice">
    <img id="foto" alt="Immagine casuale da Lorem Picsum">
  </div>

  <div class="controlli">
    <label>
      Formato
      <select id="formato">
        <option value="600/400" selected>Orizzontale (600×400)</option>
        <option value="500/500">Quadrato (500×500)</option>
        <option value="400/600">Verticale (400×600)</option>
        <option value="800/450">Wide (800×450)</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="grayscale"> Bianco e nero
    </label>
    <label>
      <input type="checkbox" id="blur"> Sfocata
    </label>
  </div>

  <div class="azioni">
    <button id="bottone">Carica un'altra immagine</button>
    <button id="scarica" class="secondario">Scarica immagine</button>
  </div>

  <script>
    const foto = document.getElementById('foto');
    const cornice = document.getElementById('cornice');
    const bottone = document.getElementById('bottone');
    const scarica = document.getElementById('scarica');
    const selFormato = document.getElementById('formato');
    const chkGray = document.getElementById('grayscale');
    const chkBlur = document.getElementById('blur');

    let semeCorrente = 0;

    function urlImmagine(seme) {
      const dimensioni = selFormato.value;            // es. "600/400"
      const params = new URLSearchParams({ random: seme });
      if (chkGray.checked) params.set('grayscale', '');
      if (chkBlur.checked) params.set('blur', '2');
      return `https://picsum.photos/${dimensioni}?${params.toString()}`;
    }

    function aggiornaRatio() {
      const [w, h] = selFormato.value.split('/');
      cornice.style.setProperty('--ratio', `${w} / ${h}`);
    }

    function carica(nuovoSeme = true) {
      if (nuovoSeme) semeCorrente = Math.floor(Math.random() * 1_000_000);
      aggiornaRatio();
      cornice.classList.add('caricamento');
      bottone.disabled = true;
      foto.src = urlImmagine(semeCorrente);
    }

    foto.addEventListener('load', () => {
      cornice.classList.remove('caricamento');
      bottone.disabled = false;
    });
    foto.addEventListener('error', () => {
      cornice.classList.remove('caricamento');
      bottone.disabled = false;
    });

    // Nuova immagine
    bottone.addEventListener('click', () => carica(true));

    // Cambiare formato/effetti riusa lo stesso seme: stessa foto, resa diversa
    selFormato.addEventListener('change', () => carica(false));
    chkGray.addEventListener('change', () => carica(false));
    chkBlur.addEventListener('change', () => carica(false));

    // Scarica l'immagine attualmente mostrata
    scarica.addEventListener('click', async () => {
      try {
        const risposta = await fetch(foto.src);
        const blob = await risposta.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `immagine_${semeCorrente}.jpg`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert('Download non riuscito: ' + e.message);
      }
    });

    // Prima immagine
    carica(true);
  </script>
</body>
</html>
